name = "flowscript-cloud"
main = "src/worker.ts"
compatibility_date = "2026-03-28"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "flowscript-cloud-db"
database_id = "local"  # placeholder — set real ID after wrangler d1 create

